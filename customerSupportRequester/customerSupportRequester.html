// customerSupportRequester.html
<template>
    <lightning-card title="Customer Support Requester">
        <template if:false={isStarted}>
            <div class="slds-p-around_medium">
                <p class="slds-m-bottom_small">
                    This component allows you to create a Customer Support Request. <br>
                    Press the "Start Customer Support Request" button to start the process.
                </p>
            </div>

            <div slot="footer" class="slds-p-around_small slds-text-align_right">
                <lightning-button variant="brand" label="Start Customer Support Request" onclick={startCustomerSupportRequest}></lightning-button>
            </div>
        </template>
        <template if:true={isStarted}>
            <div class="slds-p-around_medium">
                <p class="slds-m-bottom_small">
                    Please enter your details to open a support incident:
                </p>
    
                <lightning-input 
                    type="text" 
                    label="Last Name:" 
                    onchange={handleLastNameChange}>
                </lightning-input>
    
                <lightning-input 
                    type="text" 
                    label="First Name:" 
                    onchange={handleFirstNameChange}
                    required>
                </lightning-input>
    
                <lightning-input 
                    type="email" 
                    label="Email:" 
                    onchange={handleEmailAddressChange}
                    required>
                </lightning-input>
    
                <lightning-textarea 
                    label="Incident Description" 
                    onchange={handleIncidentDescriptionChange}
                    required>
                </lightning-textarea>
            </div>

            <div slot="footer" class="slds-p-around_small slds-text-align_right">
                <lightning-button label="Cancel" onclick={exitLWC}></lightning-button>
                <lightning-button variant="brand" label="Send Customer Support Request" onclick={sendCustomerSupportRequest}></lightning-button>
            </div>
        </template>
    </lightning-card>
</template>
